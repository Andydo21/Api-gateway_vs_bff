<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Investor Dashboard - Startup Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
            padding: 2rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .template-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .submit-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="dashboard-grid">
        <div class="card" style="grid-column: span 2;">
            <h2>🤝 Đơn Pitch đã duyệt (Chờ xếp lịch)</h2>
            <div id="approvedPitches">Đang tải...</div>
        </div>
        <div class="card">
            <h2>⚙️ Cấu hình lịch (Templates)</h2>
            <div id="templateList"></div>
            <hr>
            <h3>Thêm lịch mới</h3>
            <form onsubmit="addTemplate(event)">
                <div class="form-group">
                    <label>Ngày trong tuần (1-7):</label>
                    <input type="number" id="dayOfWeek" min="1" max="7" value="1" required>
                </div>
                <div class="form-group">
                    <label>Bắt đầu:</label>
                    <input type="time" id="startTime" value="09:00" required>
                </div>
                <div class="form-group">
                    <label>Kết thúc:</label>
                    <input type="time" id="endTime" value="10:00" required>
                </div>
                <button class="submit-btn" type="submit">Thêm Template</button>
            </form>
        </div>
        <div class="card">
            <h2>📅 Lịch Pitch của tôi</h2>
            <div id="upcomingSlots">Đang tải...</div>
        </div>
    </div>

    <!-- Simple Scheduling Modal -->
    <div id="scheduleModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; padding:2rem; border-radius:12px; width:400px; max-width:90%;">
            <h3>Chọn khung giờ cho Pitch</h3>
            <p id="modalPitchTitle"></p>
            <div id="availableSlotList" style="margin: 1.5rem 0; max-height: 200px; overflow-y: auto;"></div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button onclick="document.getElementById('scheduleModal').style.display='none'" style="padding:8px 16px; border:none; background:#eee; border-radius:4px; cursor:pointer;">Hủy</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const investorId = JSON.parse(localStorage.getItem('user') || '{}').id || 1; // Fallback to 1 for dev

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            };
        }

        async function loadDashboard() {
            loadTemplates();
            loadSlots();
            loadApprovedPitches();
        }

        async function loadApprovedPitches() {
            // Fetch pitches approved by THIS investor
            const res = await fetch(`${API_BASE}/web/pitch/list/?investor_id=${investorId}&status=APPROVED`, { headers: authHeaders() });
            const data = await res.json();
            const list = document.getElementById('approvedPitches');
            const pitches = data.data || [];
            
            if (pitches.length) {
                list.innerHTML = pitches.map(p => `
                    <div class="template-item">
                        <span><strong>${p.title}</strong> (Startup #${p.startup_id})</span>
                        <button onclick="openScheduleModal(${p.id}, '${p.title}')" style="background:#22c55e; color:white; border:none; padding:4px 12px; border-radius:4px; cursor:pointer;">Xếp lịch</button>
                    </div>
                `).join('');
            } else {
                list.innerHTML = "<p>Không có đơn Pitch nào đang chờ xếp lịch.</p>";
            }
        }

        let selectedPitchId = null;

        async function openScheduleModal(pitchId, pitchTitle) {
            selectedPitchId = pitchId;
            document.getElementById('modalPitchTitle').textContent = `Dự án: ${pitchTitle}`;
            
            // Fetch ONLY available slots for this investor
            const res = await fetch(`${API_BASE}/web/slots/?investor_id=${investorId}&status=AVAILABLE`, { headers: authHeaders() });
            const slots = await res.json();
            const list = document.getElementById('availableSlotList');
            
            if (slots.length) {
                list.innerHTML = slots.map(s => `
                    <div class="template-item">
                        <span>${new Date(s.start_time).toLocaleString()}</span>
                        <button onclick="bookPitch(${s.id})" style="background:#667eea; color:white; border:none; padding:4px 10px; border-radius:4px; cursor:pointer;">Chọn</button>
                    </div>
                `).join('');
            } else {
                list.innerHTML = "<p>Bạn không có khung giờ trống nào. Hãy thêm Template trước!</p>";
            }
            
            document.getElementById('scheduleModal').style.display = 'flex';
        }

        async function bookPitch(slotId) {
            if (!confirm("Bạn muốn xác nhận lịch Pitch này?")) return;
            
            const res = await fetch(`${API_BASE}/web/slots/${slotId}/book/`, {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ pitch_request_id: selectedPitchId })
            });
            
            if (res.ok) {
                alert("✅ Đã xếp lịch thành công! Hệ thống đang đồng bộ qua Saga.");
                document.getElementById('scheduleModal').style.display = 'none';
                loadDashboard();
            } else {
                const err = await res.json();
                alert("Lỗi: " + JSON.stringify(err));
            }
        }

        async function loadTemplates() {
            const res = await fetch(`${API_BASE}/web/availability-templates/?investor_id=${investorId}`, { headers: authHeaders() });
            const data = await res.json();
            const list = document.getElementById('templateList');
            if (data.length) {
                list.innerHTML = data.map(t => `<div class="template-item"><span>Thứ ${t.day_of_week}: ${t.start_time} - ${t.end_time}</span></div>`).join('');
            } else {
                list.innerHTML = "<p>Chưa có template nào.</p>";
            }
        }

        async function addTemplate(e) {
            e.preventDefault();
            const payload = {
                investor: investorId,
                day_of_week: parseInt(document.getElementById('dayOfWeek').value),
                start_time: document.getElementById('startTime').value,
                end_time: document.getElementById('endTime').value
            };
            const res = await fetch(`${API_BASE}/web/availability-templates/`, {
                method: 'POST', headers: authHeaders(), body: JSON.stringify(payload)
            });
            if (res.ok) { alert("✅ Đã thêm template!"); loadTemplates(); }
        }

        async function loadSlots() {
            const res = await fetch(`${API_BASE}/web/slots/?investor_id=${investorId}`, { headers: authHeaders() });
            const slots = await res.json();
            const list = document.getElementById('upcomingSlots');
            if (slots.length) {
                list.innerHTML = slots.map(s => {
                    const statusColor = s.status === 'BOOKED' ? '#22c55e' : '#64748b';
                    return `<div class="template-item">
                        <span>${new Date(s.start_time).toLocaleString()}</span>
                        <span style="color: ${statusColor}; font-weight: bold;">${s.status}</span>
                    </div>`;
                }).join('');
            } else {
                list.innerHTML = "<p>Chưa có slot nào.</p>";
            }
        }

        window.onload = loadDashboard;
    </script>
</body>

</html>
