<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - E-Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        header {
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 1rem 2rem;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
            text-decoration: none;
        }

        .back-btn {
            padding: 0.5rem 1rem;
            background: #f8f9fa;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .back-btn:hover {
            background: #e9ecef;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .cart-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        .cart-items {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .cart-items h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            background: #f8f9fa;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .item-price {
            color: #e74c3c;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quantity-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .quantity-btn:hover {
            background: #f8f9fa;
        }

        .quantity {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .remove-btn {
            color: #e74c3c;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .remove-btn:hover {
            text-decoration: underline;
        }

        .cart-summary {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .cart-summary h3 {
            margin-bottom: 1rem;
            color: #333;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            color: #6c757d;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 2px solid #e0e0e0;
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-top: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: transform 0.2s;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
        }

        .empty-cart {
            text-align: center;
            padding: 3rem;
            color: #6c757d;
        }

        .empty-cart h3 {
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .cart-content {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 0 1rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">🛒 E-Shop</a>
            <button class="back-btn" onclick="window.location.href='index.html'">← Tiếp tục mua sắm</button>
        </div>
    </header>

    <div class="container">
        <div class="cart-content">
            <div class="cart-items">
                <h2>Giỏ hàng của bạn</h2>
                <div id="cartItemsContainer"></div>
            </div>

            <div class="cart-summary">
                <h3>Tổng đơn hàng</h3>
                <div class="summary-row">
                    <span>Tạm tính:</span>
                    <span id="subtotal">0₫</span>
                </div>
                <div class="summary-row">
                    <span>Phí vận chuyển:</span>
                    <span id="shipping">30,000₫</span>
                </div>
                <div class="summary-total">
                    <span>Tổng cộng:</span>
                    <span id="total">0₫</span>
                </div>
                <button class="checkout-btn" onclick="checkout()">Thanh toán</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const SHIPPING_FEE = 30000;

        function getToken() {
            return localStorage.getItem('token');
        }

        function authHeaders() {
            const headers = {
                'Content-Type': 'application/json'
            };
            const token = getToken();
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            return headers;
        }

        window.onload = () => {
            // Check login first
            const token = getToken();
            const userId = JSON.parse(localStorage.getItem('user') || '{}').id;
            
            if (!token || !userId) {
                alert('⚠️ Bạn cần đăng nhập để xem giỏ hàng!');
                window.location.href = 'login.html';
                return;
            }
            
            loadCart();
        };

        // Load cart from database (requires login)
        async function loadCart() {
            const token = getToken();
            const userId = JSON.parse(localStorage.getItem('user') || '{}').id;

            if (token) {
                try {
                    const response = await fetch(`${API_BASE}/web/cart/?user_id=${userId}`, {
                        headers: authHeaders()
                    });

                    if (response.status === 401) {
                        alert('⚠️ Phiên đăng nhập hết hạn!');
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        window.location.href = 'login.html';
                        return;
                    }

                    const data = await response.json();

                    if (!data.success || !data.data || data.data.items.length === 0) {
                        document.getElementById('cartItemsContainer').innerHTML = `
                            <div class="empty-cart">
                                <h3>🛒 Giỏ hàng trống</h3>
                                <p>Hãy thêm sản phẩm vào giỏ hàng để tiếp tục mua sắm</p>
                            </div>`;
                        updateSummary(0);
                        return;
                    }

                    const cartItems = data.data.items;
                    renderCartItems(cartItems, true); // true = logged in mode
                    updateSummary(data.data.total_amount || 0);
                } catch (error) {
                    console.error('Lỗi tải giỏ hàng:', error);
                    loadGuestCart();
                }
            } else {
                // Nếu chưa đăng nhập, load guest cart từ localStorage
                loadGuestCart();
            }
        }

        // Load guest cart from localStorage
        function loadGuestCart() {
            const guestCart = JSON.parse(localStorage.getItem('guestCart') || '[]');
            
            if (guestCart.length === 0) {
                document.getElementById('cartItemsContainer').innerHTML = `
                    <div class="empty-cart">
                        <h3>🛒 Giỏ hàng trống</h3>
                        <p>Hãy thêm sản phẩm vào giỏ hàng để tiếp tục mua sắm</p>
                        <p style="margin-top:15px;color:#666;font-size:14px;">💡 Đăng nhập để lưu giỏ hàng của bạn</p>
                    </div>`;
                updateSummary(0);
                return;
            }

            renderCartItems(guestCart, false); // false = guest mode
            
            const total = guestCart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            updateSummary(total);
        }

        // Render cart items (both logged-in and guest)
        function renderCartItems(items, isLoggedIn) {
            const cartHTML = items.map(item => {
                const decreaseHandler = isLoggedIn 
                    ? `updateQuantity(${item.product_id}, ${item.quantity - 1})`
                    : `updateGuestQuantity(${item.product_id}, ${item.quantity - 1})`;
                
                const increaseHandler = isLoggedIn 
                    ? `updateQuantity(${item.product_id}, ${item.quantity + 1})`
                    : `updateGuestQuantity(${item.product_id}, ${item.quantity + 1})`;
                
                const removeHandler = isLoggedIn 
                    ? `removeItem(${item.product_id})`
                    : `removeGuestItem(${item.product_id})`;

                return `
                    <div class="cart-item">
                        <img src="https://via.placeholder.com/80" alt="${item.product_name}" class="item-image">
                        <div class="item-info">
                            <div class="item-name">${item.product_name}</div>
                            <div class="item-price">${formatPrice(item.price)}₫</div>
                            <div class="item-actions">
                                <div class="quantity-control">
                                    <button class="quantity-btn" onclick="${decreaseHandler}">-</button>
                                    <span class="quantity">${item.quantity}</span>
                                    <button class="quantity-btn" onclick="${increaseHandler}">+</button>
                                </div>
                                <button class="remove-btn" onclick="${removeHandler}">Xóa</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
            
            document.getElementById('cartItemsContainer').innerHTML = cartHTML;
        }

        async function updateQuantity(productId, newQuantity) {
            if (!getToken()) return;
            if (newQuantity <= 0) { await removeItem(productId); return; }
            
            const userId = JSON.parse(localStorage.getItem('user') || '{}').id;
            if (!userId) return;
            
            try {
                const res = await fetch(`${API_BASE}/web/cart/update/`, {
                    method: 'PATCH',
                    headers: authHeaders(),
                    body: JSON.stringify({ user_id: userId, product_id: productId, quantity: newQuantity })
                });
                const data = await res.json();
                if (data.success) loadCart();
            } catch (e) { alert('Lỗi cập nhật giỏ hàng'); }
        }

        async function removeItem(productId) {
            if (!confirm('Bạn muốn xóa sản phẩm này?')) return;
            
            const userId = JSON.parse(localStorage.getItem('user') || '{}').id;
            if (!userId) {
                alert('⚠️ Vui lòng đăng nhập!');
                window.location.href = 'login.html';
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/web/cart/remove/?user_id=${userId}&product_id=${productId}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });
                const data = await res.json();
                if (data.success) loadCart();
            } catch (e) { alert('Lỗi xóa sản phẩm'); }
        }

        // Guest cart functions (localStorage)
        function updateGuestQuantity(productId, newQuantity) {
            if (newQuantity <= 0) {
                removeGuestItem(productId);
                return;
            }

            const guestCart = JSON.parse(localStorage.getItem('guestCart') || '[]');
            const item = guestCart.find(i => i.product_id === productId);
            
            if (item) {
                item.quantity = newQuantity;
                localStorage.setItem('guestCart', JSON.stringify(guestCart));
                loadGuestCart();
            }
        }

        function removeGuestItem(productId) {
            if (!confirm('Bạn muốn xóa sản phẩm này?')) return;
            
            let guestCart = JSON.parse(localStorage.getItem('guestCart') || '[]');
            guestCart = guestCart.filter(i => i.product_id !== productId);
            localStorage.setItem('guestCart', JSON.stringify(guestCart));
            loadGuestCart();
        }

        async function checkout() {
            const token = getToken();
            const userId = JSON.parse(localStorage.getItem('user') || '{}').id;

            // Bắt buộc đăng nhập để đặt hàng
            if (!token || !userId) {
                if (confirm('Bạn cần đăng nhập để đặt hàng. Đăng nhập ngay?')) {
                    window.location.href = 'login.html?redirect=cart.html';
                }
                return;
            }

            try {
                // Lấy cart từ DB (xác thực bằng token)
                const cartRes = await fetch(`${API_BASE}/web/cart/?user_id=${userId}`, { 
                    headers: authHeaders()
                });
                const cartData = await cartRes.json();

                if (!cartData.success || !cartData.data || cartData.data.items.length === 0) {
                    alert('Giỏ hàng trống'); 
                    return;
                }

                const orderItems = cartData.data.items.map(item => ({
                    product_id: item.product_id,
                    product_name: item.product_name,
                    quantity: item.quantity,
                    price: item.price
                }));

                const res = await fetch(`${API_BASE}/web/orders/create/`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ items: orderItems })
                });
                const data = await res.json();

                if (data.success) {
                    // Xóa cart sau khi đặt hàng thành công
                    await fetch(`${API_BASE}/web/cart/clear/?user_id=${userId}`, {
                        method: 'DELETE',
                        headers: authHeaders()
                    });
                    alert('✅ Đặt hàng thành công!');
                    window.location.href = 'orders.html';
                } else {
                    alert(data.message || data.error || 'Đặt hàng thất bại');
                }
            } catch (e) { 
                console.error('Lỗi đặt hàng:', e);
                alert('Lỗi kết nối. Vui lòng thử lại.'); 
            }
        }

        function showLoginPrompt() {
            document.getElementById('cartItemsContainer').innerHTML = `
                <div class="empty-cart">
                    <h3>Phiên đăng nhập đã hết hạn</h3>
                    <button onclick="window.location.href='login.html'"
                        style="padding:0.5rem 1rem;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;">
                        Đăng nhập lại
                    </button>
                </div>`;
            updateSummary(0);
        }

        function updateSummary(subtotal) {
            document.getElementById('subtotal').textContent = formatPrice(subtotal) + '₫';
            document.getElementById('shipping').textContent = subtotal > 0 ? formatPrice(SHIPPING_FEE) + '₫' : '0₫';
            document.getElementById('total').textContent = formatPrice(subtotal + (subtotal > 0 ? SHIPPING_FEE : 0)) + '₫';
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN').format(price);
        }
    </script>
</body>

</html>
