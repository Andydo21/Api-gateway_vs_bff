<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Hồ sơ Pitch - Startup Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        header {
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 1rem 2rem;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
            text-decoration: none;
        }

        .back-btn {
            padding: 0.5rem 1rem;
            background: #f8f9fa;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .back-btn:hover {
            background: #e9ecef;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .pitch-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        .pitch-items {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .pitch-items h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        .pitch-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            background: #f8f9fa;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .item-price {
            color: #e74c3c;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quantity-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .quantity-btn:hover {
            background: #f8f9fa;
        }

        .quantity {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .remove-btn {
            color: #e74c3c;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .remove-btn:hover {
            text-decoration: underline;
        }

        .pitch-summary {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .pitch-summary h3 {
            margin-bottom: 1rem;
            color: #333;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            color: #6c757d;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 2px solid #e0e0e0;
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-top: 1rem;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .empty-pitch {
            text-align: center;
            padding: 3rem;
            color: #6c757d;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-registered { background: #e0e7ff; color: #4338ca; }
        .status-approved { background: #dcfce7; color: #15803d; }
        .status-rejected { background: #fee2e2; color: #b91c1c; }
        .status-scheduled { background: #fef9c3; color: #854d0e; }
        .status-completed { background: #f3f4f6; color: #374151; }

        .empty-pitch h3 {
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .pitch-content { grid-template-columns: 1fr; }
            .container { padding: 0 1rem; }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">🚀 Startup Hub</a>
            <button class="back-btn" onclick="window.location.href='index.html'">← Tiếp tục tìm kiếm Startup</button>
        </div>
    </header>

    <div class="container">
        <div class="pitch-content" style="grid-template-columns: 1fr;">
            <div class="pitch-items">
                <h2>Hồ sơ Pitch đã gửi</h2>
                <div id="pitchItemsContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const PLATFORM_FEE = 30000;

        function getToken() { return localStorage.getItem('token'); }
        function authHeaders() {
            const headers = { 'Content-Type': 'application/json' };
            const token = getToken();
            if (token) headers['Authorization'] = `Bearer ${token}`;
            return headers;
        }

        function formatPrice(price) { return new Intl.NumberFormat('vi-VN').format(price); }

        window.onload = () => {
            const token = getToken();
            if (!token) { window.location.href = 'login.html'; return; }
            loadPitch();
        };

        async function loadPitch() {
            try {
                const response = await fetch(`${API_BASE}/web/pitch/list/`, { headers: authHeaders() });
                const data = await response.json();

                if (!data.success || !data.data || data.data.length === 0) {
                    document.getElementById('pitchItemsContainer').innerHTML = `
                        <div class="empty-pitch">
                            <h3>🚀 Chưa có hồ sơ nào</h3>
                            <p>Hãy tìm Startup tiềm năng và gửi hồ sơ Pitch đầu tiên của bạn!</p>
                        </div>`;
                    return;
                }

                renderPitchItems(data.data);
            } catch (error) {
                document.getElementById('pitchItemsContainer').innerHTML = '<p>Lỗi kết nối. Vui lòng thử lại.</p>';
            }
        }

        function renderPitchItems(items) {
            const pitchHTML = items.map(item => `
                <div class="pitch-item">
                    <div class="item-info">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <div class="item-name" style="font-size: 1.2rem;">${item.title}</div>
                            <span class="status-badge status-${item.status.toLowerCase()}">${item.status}</span>
                        </div>
                        <div style="color: #6b7280; font-size: 0.9rem; margin-bottom: 1rem;">
                            Startup ID: #${item.startup_id} | Ngày gửi: ${new Date(item.created_at).toLocaleDateString()}
                        </div>
                        <div class="item-actions">
                            <a href="${item.pitch_deck_url}" target="_blank" style="color: #667eea; text-decoration: none; font-weight: 600;">
                                📂 Xem Pitch Deck
                            </a>
                        </div>
                    </div>
                </div>`).join('');
            document.getElementById('pitchItemsContainer').innerHTML = pitchHTML;
        }

        async function updateQuantity(startupId, newQuantity) {
            if (newQuantity <= 0) { await removeItem(startupId); return; }
            try {
                const res = await fetch(`${API_BASE}/web/pitch-requests/update/`, {
                    method: 'PATCH', headers: authHeaders(),
                    body: JSON.stringify({ startup_id: startupId, quantity: newQuantity })
                });
                if ((await res.json()).success) loadPitch();
            } catch (e) { alert('Lỗi cập nhật'); }
        }

        async function removeItem(startupId) {
            if (!confirm('Bạn muốn xóa Startup này khỏi danh sách?')) return;
            try {
                const res = await fetch(`${API_BASE}/web/pitch-requests/remove/?startup_id=${startupId}`, {
                    method: 'DELETE', headers: authHeaders()
                });
                if ((await res.json()).success) loadPitch();
            } catch (e) { alert('Lỗi xóa'); }
        }

        async function submitPitch() {
            try {
                const pitchRes = await fetch(`${API_BASE}/web/pitch-requests/`, { headers: authHeaders() });
                const pitchData = await pitchRes.json();
                if (!pitchData.success || !pitchData.data.items.length) { alert('Danh sách trống'); return; }

                const items = pitchData.data.items.map(i => ({
                    startup_id: i.startup_id, startup_name: i.startup_name,
                    quantity: i.quantity, price: i.price
                }));

                const res = await fetch(`${API_BASE}/web/pitch-slots/create/`, {
                    method: 'POST', headers: authHeaders(),
                    body: JSON.stringify({ items: items })
                });
                const data = await res.json();

                if (data.success) {
                    await fetch(`${API_BASE}/web/pitch-requests/clear/`, { method: 'DELETE', headers: authHeaders() });
                    alert('✅ Đã gửi Slot Pitch! Đang chờ Admin phê duyệt.');
                    window.location.href = 'pitch-slots.html';
                } else {
                    alert(data.error || 'Gửi thất bại');
                }
            } catch (e) { alert('Lỗi kết nối'); }
        }

        function updateSummary(subtotal) {
            document.getElementById('subtotal').textContent = formatPrice(subtotal) + '₫';
            document.getElementById('platformFee').textContent = subtotal > 0 ? formatPrice(PLATFORM_FEE) + '₫' : '0₫';
            document.getElementById('total').textContent = formatPrice(subtotal + (subtotal > 0 ? PLATFORM_FEE : 0)) + '₫';
        }
    </script>
</body>
</html>
