<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử Đặt lịch (Pitch Slots) - Startup Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        header {
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 1rem 2rem;
            margin-bottom: 2rem;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
            text-decoration: none;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            padding: 0.6rem 1.2rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: #5568d3;
        }

        .back-btn {
            padding: 0.6rem 1.2rem;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .back-btn:hover {
            background: #e9ecef;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #2d3748;
        }

        .orders-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .order-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .order-id {
            font-weight: 600;
            color: #2d3748;
        }

        .order-date {
            color: #718096;
            font-size: 0.9rem;
        }

        .order-status {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-available {
            background: #dcfce7;
            color: #15803d;
        }

        .status-booked {
            background: #fee2e2;
            color: #b91c1c;
        }

        .status-blocked {
            background: #f3f4f6;
            color: #4b5563;
        }

        .meeting-tag {
            display: inline-block;
            margin-top: 5px;
            padding: 2px 8px;
            background: #e0e7ff;
            color: #4338ca;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .feedback-btn {
            background: #10b981;
            margin-top: 10px;
        }

        .feedback-btn:hover {
            background: #059669;
        }

        .order-items {
            margin: 1rem 0;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f7fafc;
        }

        .item-info {
            display: flex;
            gap: 1rem;
            flex: 1;
        }

        .item-name {
            font-weight: 500;
            color: #2d3748;
        }

        .item-quantity {
            color: #718096;
            font-size: 0.9rem;
        }

        .item-price {
            font-weight: 600;
            color: #667eea;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #e2e8f0;
        }

        .order-total {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2d3748;
        }

        .order-address {
            color: #718096;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .empty-orders {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 12px;
        }

        .empty-orders h3 {
            font-size: 1.5rem;
            color: #718096;
            margin-bottom: 1rem;
        }

        .empty-orders p {
            color: #a0aec0;
            margin-bottom: 1.5rem;
        }

        .shop-btn {
            padding: 0.8rem 2rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
        }

        .shop-btn:hover {
            background: #5568d3;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #718096;
        }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: 1.4rem;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .modal p.subtitle {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        /* Star Rating */
        .star-rating {
            display: flex;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .star-rating .star {
            font-size: 2.2rem;
            cursor: pointer;
            color: #e2e8f0;
            transition: color 0.15s, transform 0.15s;
        }

        .star-rating .star:hover {
            transform: scale(1.2);
        }

        .star-rating .star.active {
            color: #f59e0b;
        }

        .star-rating .star.hover-active {
            color: #fbbf24;
        }

        .rating-label {
            font-size: 0.9rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 1rem;
            min-height: 1.2em;
        }

        /* Textarea */
        .modal textarea {
            width: 100%;
            min-height: 100px;
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.2s;
        }

        .modal textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal textarea::placeholder {
            color: #a0aec0;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }

        .modal-actions .btn-cancel {
            padding: 0.7rem 1.5rem;
            background: #f3f4f6;
            color: #4b5563;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .modal-actions .btn-cancel:hover {
            background: #e5e7eb;
        }

        .modal-actions .btn-submit {
            padding: 0.7rem 1.5rem;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .modal-actions .btn-submit:hover {
            background: #059669;
        }

        .modal-actions .btn-submit:disabled {
            background: #a7f3d0;
            cursor: not-allowed;
        }

        .modal-actions .btn-book {
            padding: 0.7rem 1.5rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .modal-actions .btn-book:hover {
            background: #5568d3;
        }

        /* Booking modal */
        .booking-info {
            background: #f8fafc;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .booking-info p {
            color: #4b5563;
            margin-bottom: 0.3rem;
            font-size: 0.95rem;
        }

        .booking-info strong {
            color: #2d3748;
        }

        /* Toast */
        .toast-msg {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            z-index: 10000;
            animation: slideUp 0.3s ease;
        }

        .toast-msg.success {
            background: #10b981;
        }

        .toast-msg.error {
            background: #ef4444;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">🚀 Startup Hub</a>
            <div class="nav-buttons">
                <button class="back-btn" onclick="window.location.href='index.html'">← Tiếp tục tìm kiếm
                    Startup</button>
                <a href="pitch-requests.html" class="nav-btn">💼 Giỏ hàng Pitch</a>
            </div>
        </div>
    </header>

    <div class="container">
        <h1>📅 Lịch hẹn Pitching (Investor Slots)</h1>
        <div id="slotsContainer" class="orders-container">
            <div class="loading">⏳ Đang tải lịch sử...</div>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div class="modal-overlay" id="feedbackModal">
        <div class="modal">
            <h2>📝 Gửi đánh giá</h2>
            <p class="subtitle">Đánh giá chất lượng buổi Pitching</p>

            <label style="font-weight:600; color:#2d3748; display:block; margin-bottom:0.5rem;">Đánh giá sao</label>
            <div class="star-rating" id="starRating">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
            <div class="rating-label" id="ratingLabel">Chọn số sao đánh giá</div>

            <label style="font-weight:600; color:#2d3748; display:block; margin-bottom:0.5rem;">Nhận xét chi
                tiết</label>
            <textarea id="feedbackComment" placeholder="Chia sẻ nhận xét của bạn về buổi Pitching..."></textarea>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeFeedbackModal()">Hủy</button>
                <button class="btn-submit" id="btnSubmitFeedback" disabled onclick="doSubmitFeedback()">Gửi đánh
                    giá</button>
            </div>
        </div>
    </div>

    <!-- Booking Confirmation Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal">
            <h2>📅 Xác nhận đặt lịch</h2>
            <p class="subtitle">Bạn có chắc muốn đặt lịch Pitching tại slot này?</p>
            <div class="booking-info" id="bookingInfo"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeBookingModal()">Hủy</button>
                <button class="btn-book" id="btnConfirmBook" onclick="doConfirmBook()">✅ Xác nhận đặt lịch</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentFeedbackBookingId = null;
        let currentFeedbackRating = 0;
        let currentBookSlotId = null;
        let currentBookSlotData = null;

        function getToken() { return localStorage.getItem('token'); }
        function authHeaders() {
            const h = { 'Content-Type': 'application/json' };
            const t = getToken();
            if (t) h['Authorization'] = `Bearer ${t}`;
            return h;
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('vi-VN', {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        function getStatusClass(s) {
            return { AVAILABLE: 'status-available', BOOKED: 'status-booked', BLOCKED: 'status-blocked' }[s] || 'status-available';
        }
        function getStatusText(s) {
            return { AVAILABLE: '🟢 Còn trống', BOOKED: '🔴 Đã đặt', BLOCKED: '🔒 Đã chặn' }[s] || s;
        }

        function showToast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `toast-msg ${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }

        // ============ STAR RATING ============
        const ratingLabels = ['', 'Rất tệ 😞', 'Tệ 😕', 'Bình thường 😐', 'Tốt 😊', 'Xuất sắc 🤩'];
        document.querySelectorAll('#starRating .star').forEach(star => {
            star.addEventListener('mouseenter', () => {
                const val = parseInt(star.dataset.value);
                document.querySelectorAll('#starRating .star').forEach(s => {
                    s.classList.toggle('hover-active', parseInt(s.dataset.value) <= val);
                });
            });
            star.addEventListener('mouseleave', () => {
                document.querySelectorAll('#starRating .star').forEach(s => s.classList.remove('hover-active'));
            });
            star.addEventListener('click', () => {
                currentFeedbackRating = parseInt(star.dataset.value);
                document.querySelectorAll('#starRating .star').forEach(s => {
                    s.classList.toggle('active', parseInt(s.dataset.value) <= currentFeedbackRating);
                });
                document.getElementById('ratingLabel').textContent = ratingLabels[currentFeedbackRating];
                updateSubmitBtn();
            });
        });

        function updateSubmitBtn() {
            const comment = document.getElementById('feedbackComment').value.trim();
            document.getElementById('btnSubmitFeedback').disabled = !(currentFeedbackRating > 0 && comment.length > 0);
        }
        document.getElementById('feedbackComment')?.addEventListener('input', updateSubmitBtn);

        // ============ FEEDBACK MODAL ============
        function openFeedbackModal(bookingId) {
            currentFeedbackBookingId = bookingId;
            currentFeedbackRating = 0;
            document.getElementById('feedbackComment').value = '';
            document.querySelectorAll('#starRating .star').forEach(s => s.classList.remove('active'));
            document.getElementById('ratingLabel').textContent = 'Chọn số sao đánh giá';
            document.getElementById('btnSubmitFeedback').disabled = true;
            document.getElementById('feedbackModal').classList.add('active');
        }
        function closeFeedbackModal() {
            document.getElementById('feedbackModal').classList.remove('active');
        }

        async function doSubmitFeedback() {
            const comment = document.getElementById('feedbackComment').value.trim();
            if (!currentFeedbackRating || !comment) return;

            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.id) { showToast('Vui lòng đăng nhập lại', 'error'); return; }

            const btn = document.getElementById('btnSubmitFeedback');
            btn.disabled = true;
            btn.textContent = 'Đang gửi...';

            try {
                const res = await fetch(`${API_BASE}/web/feedback/submit/`, {
                    method: 'POST', headers: authHeaders(),
                    body: JSON.stringify({
                        booking_id: currentFeedbackBookingId,
                        rating: currentFeedbackRating,
                        comment: comment,
                        investor_id: user.id
                    })
                });
                const data = await res.json();
                if (res.ok && data.id) {
                    closeFeedbackModal();
                    showToast('✅ Đã gửi đánh giá thành công!');
                    loadSlots();
                } else {
                    showToast(`Lỗi: ${data.error || data.detail || 'Không xác định'}`, 'error');
                }
            } catch (e) {
                showToast('Lỗi kết nối server', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Gửi đánh giá';
            }
        }

        // ============ BOOKING MODAL ============
        function openBookingModal(slotId, slotData) {
            currentBookSlotId = slotId;
            currentBookSlotData = slotData;
            document.getElementById('bookingInfo').innerHTML = `
                <p><strong>📋 Investor:</strong> #${slotData.investor_id}</p>
                <p><strong>🕐 Bắt đầu:</strong> ${formatDate(slotData.start_time)}</p>
                <p><strong>🕐 Kết thúc:</strong> ${formatDate(slotData.end_time)}</p>
            `;
            document.getElementById('bookingModal').classList.add('active');
        }
        function closeBookingModal() {
            document.getElementById('bookingModal').classList.remove('active');
        }

        async function doConfirmBook() {
            const btn = document.getElementById('btnConfirmBook');
            btn.disabled = true;
            btn.textContent = 'Đang xử lý...';

            try {
                const res = await fetch(`${API_BASE}/web/slots/${currentBookSlotId}/book/`, {
                    method: 'PATCH', headers: authHeaders()
                });
                const data = await res.json();
                if (data.success) {
                    closeBookingModal();
                    showToast('✅ Đã đặt lịch thành công!');
                    loadSlots();
                } else {
                    showToast('Lỗi: ' + (data.error || 'Không thể đặt lịch.'), 'error');
                }
            } catch (e) {
                showToast('Lỗi kết nối server', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '✅ Xác nhận đặt lịch';
            }
        }

        // ============ LOAD & RENDER ============
        async function loadSlots() {
            try {
                const response = await fetch(`${API_BASE}/web/slots/`, { headers: authHeaders() });
                const slots = await response.json();
                if (!response.ok) throw new Error(slots.error || `Slots API failed: ${response.status}`);

                const mRes = await fetch(`${API_BASE}/web/meetings/`, { headers: authHeaders() });
                const meetings = mRes.ok ? await mRes.json() : [];

                const fRes = await fetch(`${API_BASE}/web/feedbacks/`, { headers: authHeaders() });
                const feedbacks = fRes.ok ? await fRes.json() : [];

                if (!slots || slots.length === 0) {
                    document.getElementById('slotsContainer').innerHTML = `
                        <div class="empty-orders">
                            <h3>📅 Chưa có lịch hẹn nào</h3>
                            <p>Các Investor sẽ sớm mở các Slot Pitching tại đây!</p>
                            <a href="index.html" class="shop-btn">Khám phá Startup</a>
                        </div>`;
                    return;
                }
                renderSlots(slots, meetings, feedbacks);
            } catch (error) {
                document.getElementById('slotsContainer').innerHTML = `
                    <div class="empty-orders">
                        <h3>❌ Lỗi tải dữ liệu</h3>
                        <p>${error.message || 'Không thể tải slots/meetings.'}</p>
                    </div>`;
            }
        }

        function renderSlots(slots, meetings, feedbacks) {
            const slotsHTML = slots.map(slot => {
                const meeting = (meetings || []).find(m => m.booking === slot.id);
                const slotFeedbacks = (feedbacks || []).filter(f => f.booking_id === slot.id);
                const slotJSON = JSON.stringify(slot).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                return `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">Lịch Investor #${slot.investor_id}</div>
                            <div class="order-date">Bắt đầu: ${formatDate(slot.start_time)}</div>
                            <div class="order-date">Kết thúc: ${formatDate(slot.end_time)}</div>
                            ${meeting ? `
                                <div class="meeting-tag">📍 ${meeting.meeting_type}: <a href="${meeting.meeting_url}" target="_blank" style="color: inherit;">Join Meeting</a></div>
                            ` : ''}
                            ${slotFeedbacks.length > 0 ? `
                                <div class="meeting-tag" style="margin-top: 8px; background: #eef8ff; color: #0b4a6f;">
                                    📝 Đánh giá (${slotFeedbacks.length}):<br>
                                    ${slotFeedbacks.slice(0, 3).map(f => `• ${'⭐'.repeat(Math.max(1, Math.min(5, f.rating || 0)))} - ${f.comment}`).join('<br>')}
                                </div>
                            ` : ''}
                        </div>
                        <span class="order-status ${getStatusClass(slot.status)}">
                            ${getStatusText(slot.status)}
                        </span>
                    </div>
                    <div class="order-footer">
                        <button class="shop-btn" 
                                onclick="openBookingModal(${slot.id}, JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify({ investor_id: slot.investor_id, start_time: slot.start_time, end_time: slot.end_time }))}'))) "
                                ${slot.status !== 'AVAILABLE' ? 'disabled style="background:#ccc; cursor:not-allowed;"' : ''}>
                            ĐẶT LỊCH PITCH
                        </button>
                        ${slot.status === 'BOOKED' ? `
                            <button class="shop-btn feedback-btn" onclick="openFeedbackModal(${slot.id})">GỬI FEEDBACK</button>
                        ` : ''}
                    </div>
                </div>
            `}).join('');
            document.getElementById('slotsContainer').innerHTML = slotsHTML;
        }

        // Close modals on backdrop click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', e => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });

        window.onload = loadSlots;
    </script>
</body>

</html>
