<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Startup Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .logo p {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: #667eea;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            padding: 5px;
            user-select: none;
        }

        .toggle-password:hover {
            color: #764ba2;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #6c757d;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .demo-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #6c757d;
        }

        .demo-info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🚀 Startup Hub</h1>
            <p>Đăng nhập để khai phá cơ hội</p>
        </div>

        <div id="errorMsg" class="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" required autocomplete="username" placeholder="Nhập tên đăng nhập...">
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" required autocomplete="current-password" placeholder="Nhập mật khẩu...">
                    <button type="button" class="toggle-password" id="togglePassword">Hiện</button>
                </div>
            </div>

            <button type="submit" class="btn-login">Đăng nhập</button>
            
            <!-- Dev Bypass: Quick access for development -->
            <button type="button" onclick="devBypass()" style="
                width: 100%; margin-top: 12px; padding: 10px;
                background: #4b5563; color: white; border: none;
                border-radius: 8px; font-size: 0.9rem; font-weight: 600;
                cursor: pointer; transition: background 0.2s;
            ">⚡ Bypass Login (Dev Mode)</button>
        </form>

        <div class="demo-info">
            <strong>Tài khoản demo:</strong><br>
            Username: <code>john_doe</code><br>
            Password: <code>password123</code>
        </div>

        <div class="register-link">
            Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>

    <script>
        const API_BASE = '';

        function devBypass() {
            localStorage.setItem('token', 'dev-bypass-token');
            localStorage.setItem('username', 'Developer');
            localStorage.setItem('role', 'admin');
            localStorage.setItem('user', JSON.stringify({id: 1, username: 'dev-admin', role: 'admin'}));
            window.location.href = 'index.html';
        }

        // Sync guest pitch requests to database after login
        async function syncGuestPitchToDatabase(userId, token) {
            if (!userId || !token) return;

            const guestPitch = JSON.parse(localStorage.getItem('guestPitch') || '[]');
            
            if (guestPitch.length === 0) return;

            try {
                for (const item of guestPitch) {
                    await fetch(`${API_BASE}/api/v1/pitch-requests/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            startup_id: item.startup_id || item.product_id,
                            startup_name: item.startup_name || item.product_name,
                            price: item.price,
                            quantity: item.quantity
                        })
                    });
                }
                localStorage.removeItem('guestPitch');
            } catch (error) {
                console.error('Error syncing guest pitch requests:', error);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/users/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success && (data.tokens || data.token)) {
                    const token = data.tokens ? data.tokens.access : data.token;
                    localStorage.setItem('token', token);
                    localStorage.setItem('username', data.user?.username || username);
                    localStorage.setItem('role', data.user?.role || 'user');
                    localStorage.setItem('user', JSON.stringify(data.user || {}));
                    
                    await syncGuestPitchToDatabase(data.user?.id, token);
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');
                    
                    // Update legacy redirect
                    let targetPage = redirect || 'index.html';
                    if (targetPage === 'product.html') targetPage = 'startup.html';
                    
                    window.location.href = targetPage;
                } else {
                    errorMsg.textContent = data.message || data.error || 'Đăng nhập thất bại';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = 'Lỗi kết nối Server.';
                errorMsg.style.display = 'block';
            }
        });

        // Toggle Password Visibility
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('togglePassword');

        toggleButton.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleButton.textContent = type === 'password' ? 'Hiện' : 'Ẩn';
        });
    </script>
</body>
</html>
 Riverside
