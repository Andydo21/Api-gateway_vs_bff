# SonarQube configuration for API Gateway vs BFF
sonar.projectKey=api-gateway-vs-bff
sonar.projectName=API Gateway vs BFF
sonar.projectVersion=1.0

# Path to source directories
sonar.sources=api-gateway,bff,microservices,frontend

# Language-specific settings
sonar.language=py
sonar.python.version=3
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/tests.py,**/migrations/**,**/static/**,**/templates/**,node_modules/**

# Python-specific analysis
sonar.python.pylint.reportPath=pylint_report.txt
sonar.python.coverage.reportPaths=coverage.xml
