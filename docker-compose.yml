# [SCRUM-10] DevOps: Docker Compose Orchestration & Production Deployment
version: '3.8'

services:
  # Kafka Message Broker
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo stat | nc localhost 2181"]


  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]


  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=microservices
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d microservices"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISED_LISTEN_ADDRESS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "endpoint", "health"]

  # Frontend Service (UI Server)
  frontend-service:
    build: ./frontend-service
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - REDIS_HOST=redis

    deploy:
      replicas: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./frontend-service:/app
      - ./frontend:/app/frontend

  # Web BFF
  web-bff:
    build: ./bff/web-bff
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - USER_SERVICE_URL=http://user-service:4001
      - STARTUP_SERVICE_URL=http://startup-service:4002
      - SCHEDULING_SERVICE_URL=http://scheduling-service:4008
      - BOOKING_SERVICE_URL=http://booking-service:4009
      - MEETING_SERVICE_URL=http://meeting-service:4010
      - FEEDBACK_SERVICE_URL=http://feedback-service:4011
      - FUNDING_SERVICE_URL=http://funding-service:4004
      - RESOURCE_SERVICE_URL=http://resource-service:4005
      - MATCHMAKING_SERVICE_URL=http://matchmaking-service:4006
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    deploy:
      replicas: 2
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./bff/web-bff:/app

  # Admin BFF
  admin-bff:
    build: ./bff/admin-bff
    ports:
      - "3002:3002"
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - USER_SERVICE_URL=http://user-service:4001
      - STARTUP_SERVICE_URL=http://startup-service:4002
      - SCHEDULING_SERVICE_URL=http://scheduling-service:4008
      - BOOKING_SERVICE_URL=http://booking-service:4009
      - MEETING_SERVICE_URL=http://meeting-service:4010
      - FEEDBACK_SERVICE_URL=http://feedback-service:4011
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./bff/admin-bff:/app

  # User Service
  user-service:
    build: ./microservices/user-service
    ports:
      - "4001:4001"
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./microservices/user-service:/app

  # Startup Service
  startup-service:
    build: ./microservices/startup-service
    ports:
      - "4002:4002"
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./microservices/startup-service:/app

  # Pitching Service
  scheduling-service:
    build: ./microservices/scheduling-service
    ports:
      - "4008:4008"
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./microservices/scheduling-service:/app

  booking-service:
    build: ./microservices/booking-service
    ports:
      - "4009:4009"
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./microservices/booking-service:/app

  meeting-service:
    build: ./microservices/meeting-service
    ports:
      - "4010:4010"
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./microservices/meeting-service:/app

  feedback-service:
    build: ./microservices/feedback-service
    ports:
      - "4011:4011"
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./microservices/feedback-service:/app

  # Funding Service
  funding-service:
    build: ./microservices/funding-service
    ports:
      - "4004:4004"
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./microservices/funding-service:/app

  # Resource Service
  resource-service:
    build: ./microservices/resource-service
    ports:
      - "4005:4005"
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./microservices/resource-service:/app

  # Matchmaking Service
  matchmaking-service:
    build: ./microservices/matchmaking-service
    ports:
      - "4006:4006"
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./microservices/matchmaking-service:/app

  # Notification Service
  notification-service:
    build: ./microservices/notification-service
    ports:
      - "4007:4007"
    environment:
      - DEBUG=True
      - DB_NAME=microservices
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./microservices/notification-service:/app

  # Apache APISIX Gateway
  apisix:
    image: apache/apisix:3.9.0-debian
    ports:
      - "80:80"
      - "9091:9091"
      - "9180:9180"
    volumes:
      - ./apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    depends_on:
      etcd:
        condition: service_healthy
      web-bff:
        condition: service_started
      admin-bff:
        condition: service_started
      frontend-service:
        condition: service_started

  # APISIX Dashboard
  apisix-dashboard:
    image: apache/apisix-dashboard:3.0.1-alpine
    ports:
      - "9000:9000"
    volumes:
      - ./apisix_conf/dashboard_conf.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro
    depends_on:
      etcd:
        condition: service_healthy

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    volumes:
      - ./prometheus_conf/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - apisix

  # Monitoring: Grafana
  grafana:
    image: grafana/grafana:10.0.3
    container_name: grafana
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
